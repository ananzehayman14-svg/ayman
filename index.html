<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>VR Assignment - ACh Binding Journey</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-entity environment="preset: starry; groundColor: #111; grid: dots"></a-entity>

      <a-entity light="type: ambient; intensity: 0.5"></a-entity>
      <a-entity light="type: directional; intensity: 0.8" position="-1 1 1"></a-entity>

      <a-entity id="nicotinic-site" position="-3 1.5 -5">
        <a-gltf-model src="1UW6.glb" scale="0.05 0.05 0.05" animation="property: rotation; to: 0 360 0; loop: true; dur: 20000; easing: linear"></a-gltf-model>
        <a-text value="Nicotinic Receptor" position="0 -2 0" align="center" width="4" color="#4CC3D9"></a-text>
      </a-entity>

      <a-entity id="muscarinic-site" position="3 1.5 -5">
        <a-gltf-model src="4DAJ.glb" scale="0.05 0.05 0.05" animation="property: rotation; to: 0 360 0; loop: true; dur: 20000; easing: linear"></a-gltf-model>
        <a-text value="Muscarinic Receptor" position="0 -2 0" align="center" width="4" color="#EF2D5E"></a-text>
      </a-entity>

      <a-entity id="ach-logic">
        <a-gltf-model src="acetylcholine.glb" scale="0.2 0.2 0.2"
                      animation="property: position; 
                                 dist: 0 1.5 -3; 
                                 values: 0 1.5 -3; -2.8 1.5 -4.8; 0 1.5 -3; 2.8 1.5 -4.8; 0 1.5 -3;
                                 dur: 10000; 
                                 easing: easeInOutQuad; 
                                 loop: true">
        </a-gltf-model>
        <a-text value="Acetylcholine (ACh)" position="0 1.8 -3" align="center" width="2" 
                animation="property: position; values: 0 1.8 -3; -2.8 1.8 -4.8; 0 1.8 -3; 2.8 1.8 -4.8; 0 1.8 -3; dur: 10000; loop: true">
        </a-text>
      </a-entity>

      <a-entity camera look-controls wasd-controls position="0 1.6 0">
        <a-cursor color="#FF0000"></a-cursor>
      </a-entity>
    </a-scene>
  </body>
</html>
